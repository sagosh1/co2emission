name: CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-quality:
    name: Build, Test & Quality Gates
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Static analysis (lint)
        run: npm run lint

      - name: Unit tests
        run: npm run test:coverage

      - name: Mutation testing
        run: npm run mutate

      - name: Code metrics
        run: npm run metrics

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            reports/
            coverage/
          retention-days: 30
